# /boot/grub/grub.cfg — Nekros bootloader configuration
#
# GRUB2 Multiboot2 boot menu for Nekros.
# Place this file at /boot/grub/grub.cfg on the boot partition.
#
# The Nekros kernel ELF is a Multiboot2-compliant x86-64 binary.
# GRUB2 handles the 32→64 bit transition via Multiboot2 protocol.

set timeout=5
set default=0
set gfxmode=auto

insmod all_video
insmod gfxterm
terminal_output gfxterm

# ── Color theme ─────────────────────────────────────────────
set color_normal=light-cyan/black
set color_highlight=white/light-blue
set menu_color_normal=cyan/black
set menu_color_highlight=white/blue

# ── Boot menu ────────────────────────────────────────────────

menuentry "Nekros — Secure Developer Kernel" --class os {
    echo "Loading Nekros kernel..."
    multiboot2 /boot/nekros.elf
    echo "Booting..."
    boot
}

menuentry "Nekros (serial debug — COM1 115200)" --class os {
    echo "Loading Nekros (debug mode)..."
    multiboot2 /boot/nekros.elf debug
    echo "Booting with serial debug..."
    boot
}

menuentry "Nekros (verbose init)" --class os {
    echo "Loading Nekros (verbose)..."
    multiboot2 /boot/nekros.elf verbose
    echo "Booting verbose..."
    boot
}

# ── Boot instructions printed if no selection ──────────────
if timeout == 0; then
    echo ""
    echo "Nekros — Secure Developer Kernel"
    echo "Neri v0.5.0 + CortexCrypto"
    echo "Novel syscalls: nk_proc_intent nk_work_budget"
    echo "                nk_attest nk_secure_alloc nk_ipc"
    echo "                nk_thermal_hint nk_pledge"
fi
